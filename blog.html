<!DOCTYPE html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VoucherHub Blog</title>
    <meta
      name="description"
      content="Conteudos sobre experiencias em Portugal com dicas, roteiros e descontos."
    />
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="icon" type="image/png" href="favcon.png" />
  </head>
  <body data-page="blog-list">
    <nav class="navbar">
      <div class="nav-container">
        <a href="index.html" class="logo">
          <img src="logo.png" alt="VoucherHub Logo" />
        </a>
        <div class="nav-badge">
          <i class="fas fa-newspaper"></i>
          <span>Blog VoucherHub</span>
        </div>
      </div>
    </nav>

    <main class="blog-page container">
      <header class="section-header">
        <h1 id="blog-page-title">Blog VoucherHub</h1>
        <p id="blog-page-subtitle">Conteudos para aproveitar melhor suas experiencias.</p>
      </header>
      <section id="blog-list" class="blog-grid"></section>
      <p id="blog-empty-state" style="display: none">Nenhum artigo publicado ainda.</p>
    </main>

    <footer class="footer">
      <div class="container">
        <div class="footer-bottom">
          <div class="footer-text">
            <p>&copy; 2025 VoucherHub. Todos os direitos reservados.</p>
          </div>
        </div>
      </div>
    </footer>

    <script src="i18n.js" defer></script>
    <script src="blog.js" defer></script>
  </body>
</html>
