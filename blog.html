<!DOCTYPE html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VoucherHub Blog</title>
    <meta
      name="description"
      content="Conteudos sobre experiencias em Portugal com dicas, roteiros e descontos."
    />
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="icon" type="image/png" href="favcon.png" />
  </head>
  <body data-page="blog-list">
    <nav class="navbar">
      <div class="nav-container">
        <a href="index.html" class="logo">
          <img src="logo.png" alt="VoucherHub Logo" />
        </a>
        <div class="nav-badge">
          <i class="fas fa-newspaper"></i>
          <span data-i18n="blog.navBadge">Blog VoucherHub</span>
        </div>
      </div>
    </nav>

    <section class="blog-hero" aria-labelledby="blog-hero-heading">
      <div class="blog-hero-glow" aria-hidden="true"></div>
      <div class="container blog-hero-inner">
        <h1 id="blog-hero-heading" data-i18n="blog.heroTitle">
          Dicas & Experiências VoucherHub
        </h1>
        <p class="blog-hero-subtitle" data-i18n="blog.heroSubtitle">
          Descubra os segredos de Lisboa e região: experiências únicas e inesquecíveis. Clique nos artigos abaixo para ler o guia completo.
        </p>
      </div>
    </section>

    <main class="blog-page container">
      <section id="blog-list" class="blog-grid" aria-label="Artigos"></section>
      <p id="blog-empty-state" class="blog-empty-state" data-i18n="blog.emptyState" style="display: none">
        Nenhum artigo publicado ainda.
      </p>
    </main>

    <footer class="footer">
      <div class="container">
        <div class="footer-bottom">
          <div class="footer-text">
            <p>&copy; 2025 VoucherHub. Todos os direitos reservados.</p>
          </div>
        </div>
      </div>
    </footer>

    <script src="i18n.js" defer></script>
    <script src="blog.js" defer></script>
  </body>
</html>
