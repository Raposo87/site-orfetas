<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VoucherHub - Painel Admin</title>
    <style>
      body {
        font-family: sans-serif;
        max-width: 680px;
        margin: 50px auto;
        padding: 20px;
        border: 1px solid #ccc;
        border-radius: 8px;
        background-color: #f9f9f9;
      }
      h2 {
        color: #333;
        text-align: center;
      }
      .subtitle {
        text-align: center;
        color: #666;
        margin-top: -4px;
        margin-bottom: 20px;
      }
      label {
        font-size: 12px;
        color: #666;
        font-weight: bold;
      }
      input,
      select,
      textarea,
      button {
        width: 100%;
        padding: 12px;
        margin: 8px 0 20px 0;
        display: block;
        box-sizing: border-box;
        border-radius: 4px;
        border: 1px solid #ddd;
      }
      textarea {
        min-height: 80px;
        resize: vertical;
        font-family: inherit;
        font-size: 14px;
      }
      .section-title {
        font-size: 13px;
        font-weight: bold;
        color: #444;
        background: #e8eaf6;
        padding: 6px 10px;
        border-radius: 4px;
        margin: 24px 0 8px 0;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .offer-row {
        display: grid;
        grid-template-columns: 1.2fr 1.8fr 0.8fr auto;
        gap: 8px;
        align-items: center;
        margin-bottom: 8px;
      }
      .offer-row input {
        margin: 0;
      }
      .offer-row button {
        margin: 0;
        width: auto;
        padding: 10px 14px;
      }
      .btn-add-offer {
        background: #16a34a;
        font-size: 13px;
        padding: 8px 16px;
        width: auto;
        margin-bottom: 20px;
      }
      .btn-add-offer:hover {
        background: #15803d;
      }
      button {
        background: #6772e5;
        color: white;
        border: none;
        cursor: pointer;
        font-weight: bold;
        font-size: 16px;
        margin-top: 10px;
      }
      button:hover {
        background: #5469d4;
      }
      .result {
        margin-top: 20px;
        padding: 15px;
        background: #e7f3ff;
        border: 1px solid #b2d7ff;
        border-radius: 4px;
        display: none;
        word-break: break-all;
      }
      .notice {
        padding: 12px;
        border-radius: 6px;
        margin-bottom: 16px;
        display: none;
      }
      .notice.error {
        display: block;
        background: #fee2e2;
        color: #991b1b;
        border: 1px solid #fecaca;
      }
      .notice.success {
        display: block;
        background: #dcfce7;
        color: #166534;
        border: 1px solid #bbf7d0;
      }
      .hidden {
        display: none;
      }
      .actions {
        display: flex;
        gap: 10px;
        margin-top: 8px;
      }
      .actions button {
        margin: 0;
      }
      .btn-secondary {
        background: #e2e8f0;
        color: #0f172a;
      }
      .btn-secondary:hover {
        background: #cbd5e1;
      }
      .btn-danger {
        background: #dc2626;
      }
      .btn-danger:hover {
        background: #b91c1c;
      }
    </style>
  </head>
  <body>
    <h2>🚀 Gerador de Parceiros</h2>
    <p class="subtitle">Acesso permitido apenas para perfis owner e admin.</p>
    <div id="notice" class="notice"></div>

    <div id="sessionBox" class="hidden">
      <p><b>Logado como:</b> <span id="sessionUser">-</span></p>
      <div class="actions">
        <button type="button" class="btn-secondary" id="refreshSessionBtn">
          Atualizar sessão
        </button>
        <button type="button" class="btn-secondary" id="openUsersBtn">
          Abrir gestão de usuários
        </button>
        <button type="button" class="btn-danger" id="logoutBtn">Sair</button>
      </div>
    </div>

    <form id="adminForm" class="hidden">
      <p class="section-title">📋 Dados Operacionais</p>

      <label>NOME DO PARCEIRO</label>
      <input
        type="text"
        id="name"
        placeholder="Ex: Surf Wave Lisbon"
        required
      />

      <label>SLUG (Único, sem espaços)</label>
      <input
        type="text"
        id="slug"
        placeholder="Ex: surf-wave-lisbon"
        required
      />

      <label>EMAIL DO PARCEIRO</label>
      <input
        type="email"
        id="email"
        placeholder="email@parceiro.com"
        required
      />

      <label>TELEFONE</label>
      <input type="text" id="phone" placeholder="+351 999 999 999" />

      <label>LOCALIZAÇÃO</label>
      <input type="text" id="location" placeholder="Ex: Costa da Caparica" />

      <label>PREÇO ORIGINAL (Cêntimos: 3000 = 30€)</label>
      <input type="number" id="price" placeholder="3000" />

      <p class="section-title">🌐 Catálogo Público</p>

      <label>CATEGORIA / MODO</label>
      <select id="mode_slug">
        <option value="">— Selecione uma categoria —</option>
      </select>

      <label>DESCONTO (%)</label>
      <input
        type="number"
        id="discount_percent"
        placeholder="Ex: 15"
        min="0"
        max="100"
      />

      <label>CÓDIGO DO VOUCHER (opcional)</label>
      <input type="text" id="voucher_code" placeholder="Ex: SURF15" />

      <label>INSTAGRAM (URL completa)</label>
      <input
        type="url"
        id="instagram"
        placeholder="https://www.instagram.com/..."
      />

      <label>SITE OFICIAL (URL)</label>
      <input type="url" id="official_url" placeholder="https://..." />

      <label>HISTÓRIA CURTA (1-2 frases para o card)</label>
      <textarea
        id="story_short"
        placeholder="Breve descrição do parceiro..."
      ></textarea>

      <label>HISTÓRIA COMPLETA (para a página do parceiro)</label>
      <textarea
        id="story_full"
        style="min-height: 120px"
        placeholder="Descrição detalhada..."
      ></textarea>

      <label>IMAGENS (uma URL por linha)</label>
      <textarea
        id="images_raw"
        placeholder="https://exemplo.com/foto1.jpg&#10;https://exemplo.com/foto2.jpg"
      ></textarea>

      <p class="section-title">🎁 Ofertas</p>
      <div id="offers-container"></div>
      <button type="button" class="btn-add-offer" id="addOfferBtn">
        + Adicionar Oferta
      </button>

      <button type="submit" id="btn" style="margin-top: 24px">
        Criar Parceiro e Gerar Link Stripe
      </button>
    </form>

    <div id="result" class="result"></div>

    <script>
      const AUTH_API =
        "https://voucherhub-backend-production.up.railway.app/api/auth";
      const ADMIN_API =
        "https://voucherhub-backend-production.up.railway.app/api/admin";
      const CATALOG_API =
        "https://voucherhub-backend-production.up.railway.app/api/catalog";
      const TOKEN_STORAGE_KEY = "voucherhub_admin_token";

      const notice = document.getElementById("notice");
      const sessionBox = document.getElementById("sessionBox");
      const sessionUser = document.getElementById("sessionUser");
      const adminForm = document.getElementById("adminForm");
      const fallbackModes = [
        { slug: "surf", title: "Aulas de Surf", badge: "Esportes Aquáticos" },
        {
          slug: "kitesurf",
          title: "Aulas de Kitesurf",
          badge: "Esportes Aquáticos",
        },
        { slug: "moda", title: "Moda e Vestuário", badge: "Estilo de Vida" },
        {
          slug: "tour",
          title: "Tour com Guia e Motorista",
          badge: "Cultura e História",
        },
        { slug: "yoga", title: "Estúdios de Yoga", badge: "Bem-Estar" },
        { slug: "wellness", title: "Saúde & Bem-estar", badge: "Terapias" },
        { slug: "bike", title: "Bike Tour", badge: "Cultura e História" },
        {
          slug: "tour-aquatico",
          title: "Tour Aquático",
          badge: "Ocean Adventures",
        },
        {
          slug: "tour-aereas",
          title: "Experiências Aéreas",
          badge: "Voo e Aventura",
        },
        { slug: "quad", title: "Aventura Off-Road", badge: "Aventura" },
        {
          slug: "eventos-entretenimento",
          title: "Eventos e Entretenimentos",
          badge: "Diversão",
        },
      ];

      function getToken() {
        return localStorage.getItem(TOKEN_STORAGE_KEY);
      }

      function clearToken() {
        localStorage.removeItem(TOKEN_STORAGE_KEY);
      }

      function showNotice(message, type) {
        notice.textContent = message;
        notice.className = `notice ${type}`;
      }

      function clearNotice() {
        notice.textContent = "";
        notice.className = "notice";
      }

      // Carregar categorias disponíveis no select
      function populateModes(modes) {
        const select = document.getElementById("mode_slug");
        const seen = new Set();
        for (const m of modes || []) {
          if (!m?.slug || seen.has(m.slug)) continue;
          seen.add(m.slug);
          const opt = document.createElement("option");
          opt.value = m.slug;
          opt.textContent = m.title + (m.badge ? ` (${m.badge})` : "");
          select.appendChild(opt);
        }
      }

      async function loadModes() {
        try {
          const res = await fetch(`${CATALOG_API}/modes`);
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const data = await res.json();
          if (!Array.isArray(data.modes) || data.modes.length === 0) {
            throw new Error("Sem categorias na API");
          }
          populateModes(data.modes);
        } catch (e) {
          console.warn("Não foi possível carregar os modos do catálogo.", e);
          populateModes(fallbackModes);
          showNotice(
            "As categorias foram carregadas pelo fallback local. Pode continuar o cadastro normalmente.",
            "success",
          );
        }
      }

      // Gestão de ofertas dinâmicas
      let offerCount = 0;
      function addOfferRow(title = "", text = "", price = "") {
        offerCount++;
        const container = document.getElementById("offers-container");
        const row = document.createElement("div");
        row.className = "offer-row";
        row.dataset.offerId = offerCount;
        row.innerHTML = `
          <input type="text" placeholder="Título da oferta" value="${title}" class="offer-title" />
          <input type="text" placeholder="Descrição da oferta" value="${text}" class="offer-text" />
          <input type="number" placeholder="Preço (€)" value="${price}" class="offer-price" step="0.01" min="0" />
          <button type="button" onclick="removeOffer(this)" style="background:#dc2626; width:auto; padding:10px 14px; margin:0;">✕</button>
        `;
        container.appendChild(row);
      }

      function removeOffer(btn) {
        btn.closest(".offer-row").remove();
      }

      document
        .getElementById("addOfferBtn")
        .addEventListener("click", () => addOfferRow());

      // Adicionar uma oferta vazia por defeito
      addOfferRow();

      function getOffers() {
        const rows = document.querySelectorAll(".offer-row");
        const offers = [];
        rows.forEach((row) => {
          const title = row.querySelector(".offer-title").value.trim();
          const text = row.querySelector(".offer-text").value.trim();
          const price =
            parseFloat(row.querySelector(".offer-price").value) || 0;
          if (title) offers.push({ title, text, price });
        });
        return offers;
      }

      async function validateSession() {
        const token = getToken();
        if (!token) {
          adminForm.classList.add("hidden");
          sessionBox.classList.add("hidden");
          showNotice(
            "Você precisa fazer login em admin-usuarios.html antes de cadastrar parceiros.",
            "error",
          );
          return false;
        }

        try {
          const response = await fetch(`${AUTH_API}/me`, {
            headers: {
              Authorization: `Bearer ${token}`,
            },
          });

          const data = await response.json();
          if (!response.ok) {
            throw new Error(data.error || "Sessão inválida");
          }

          const role = (data.user?.role || "").toLowerCase();
          if (role !== "owner" && role !== "admin") {
            adminForm.classList.add("hidden");
            sessionBox.classList.remove("hidden");
            sessionUser.textContent = `${data.user?.name || data.user?.email || "-"} (${role || "sem perfil"})`;
            showNotice(
              "Seu perfil não tem permissão para cadastrar parceiros.",
              "error",
            );
            return false;
          }

          clearNotice();
          sessionBox.classList.remove("hidden");
          sessionUser.textContent = `${data.user?.name || data.user?.email || "-"} (${role})`;
          adminForm.classList.remove("hidden");
          return true;
        } catch (err) {
          adminForm.classList.add("hidden");
          sessionBox.classList.add("hidden");
          showNotice(
            "Sessão expirada ou inválida. Faça login novamente em admin-usuarios.html.",
            "error",
          );
          return false;
        }
      }

      document.getElementById("adminForm").onsubmit = async (e) => {
        e.preventDefault();

        const allowed = await validateSession();
        if (!allowed) return;

        const btn = document.getElementById("btn");
        const resDiv = document.getElementById("result");

        btn.innerText = "⏳ Processando...";
        btn.disabled = true;
        resDiv.style.display = "none";

        const imagesRaw = document.getElementById("images_raw").value.trim();
        const images = imagesRaw
          ? imagesRaw
              .split("\n")
              .map((u) => u.trim())
              .filter(Boolean)
          : [];

        const data = {
          name: document.getElementById("name").value,
          slug: document.getElementById("slug").value,
          email: document.getElementById("email").value,
          phone: document.getElementById("phone").value,
          location: document.getElementById("location").value,
          price_cents: document.getElementById("price").value,
          // Catálogo
          mode_slug: document.getElementById("mode_slug").value || null,
          discount_percent:
            parseInt(document.getElementById("discount_percent").value) || 0,
          discount_label: null,
          voucher_code: document.getElementById("voucher_code").value,
          instagram: document.getElementById("instagram").value,
          official_url: document.getElementById("official_url").value,
          icon: "fas fa-tag",
          story_short: document.getElementById("story_short").value,
          story_full: document.getElementById("story_full").value,
          images,
          offers: getOffers(),
          is_catalog_active: true,
        };

        try {
          const response = await fetch(`${ADMIN_API}/setup-partner`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${getToken()}`,
            },
            body: JSON.stringify(data),
          });

          const res = await response.json();

          if (res.success) {
            clearNotice();
            resDiv.style.display = "block";
            resDiv.innerHTML = `
              <p style="color:#2d5a27; font-weight:bold;">✅ Sucesso!</p>
              <p><b>PIN Gerado:</b> <span style="font-size:18px; color:blue;">${res.pin_gerado}</span></p>
              <p><b>Link Stripe:</b><br>
                 <a href="${res.onboarding_url}" target="_blank" style="color:#6772e5;">Abrir Cadastro Stripe</a>
              </p>
              <p style="color:#16a34a;">📣 Parceiro visível no catálogo público.</p>
            `;
          } else {
            if (response.status === 401 || response.status === 403) {
              showNotice(
                "Permissão negada. Verifique seu login/perfil em admin-usuarios.html.",
                "error",
              );
            } else {
              alert("❌ Erro: " + (res.error || "Falha no servidor"));
            }
          }
        } catch (err) {
          alert("❌ Erro de conexão.");
        } finally {
          btn.innerText = "Criar Parceiro e Gerar Link Stripe";
          btn.disabled = false;
        }
      };

      document
        .getElementById("refreshSessionBtn")
        .addEventListener("click", async () => {
          await validateSession();
        });

      document.getElementById("openUsersBtn").addEventListener("click", () => {
        window.location.href = "admin-usuarios.html";
      });

      document
        .getElementById("logoutBtn")
        .addEventListener("click", async () => {
          const token = getToken();
          try {
            if (token) {
              await fetch(`${AUTH_API}/logout`, {
                method: "POST",
                headers: {
                  Authorization: `Bearer ${token}`,
                },
              });
            }
          } catch (err) {
            // Ignora falha de rede para não impedir saída local.
          } finally {
            clearToken();
            window.location.href = "admin-usuarios.html";
          }
        });

      validateSession();
      loadModes();
    </script>
  </body>
</html>
